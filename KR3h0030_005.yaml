body:
  text: 畫繼卷五宋鄧椿撰道人衲子甘風子王顯道李德柔三朵花羅勝先李時澤楊大明寶覺真慧惠洪妙善仲仁道臻道宏法能智平祖鑒虛已覺心智源智永真休世胄婦女宦者附宋莊賈公傑郭道卿郭游卿髙大亨錢端回李景孟邵少微李元崇王㑹李蕃崇德郡君和國夫人文氏女煎艷艷陳經略婦魏觀察任源道人衲子甘風子關右人陽狂垢汚恃酒好罵落泊於廛市間酒酣耳熱大叫索紙以細筆作人物頭面動以十數然後放筆如草書法以就全體頃刻而成妙合自然多畫列仙之流題詩其後傳觀既畢往往毁裂而去好事者藏匿僅存一二豪富求之唾罵不與或經年不落一筆故流傳於世者極少一日忽别素與游者歸則薰浴題頌擲筆而逝王顯道漢州人本餅師後學道專心畫龍格製雄壯今成都三井觀三寶院有畫壁存李德柔駕部員外郎宗固孫也宗固景祐中良吏嘗守漢州有道士尹可元精練善畫以遺火得罪當死李緩其獄會赦獲免時可元年八十一自誓且死必為李氏子以報可元既死二十餘年而宗固子世昌之婦夢可元入其室而生德柔且名蜀孫幼而善畫長讀莊老喜之遂為道士賜號妙應其寫真妙絶一時坡贈詩云千年鼻祖守關門一念還為李耳孫香火舊緣何日盡丹青餘習至今存三朵花房州人許安世通判其州以書遺坡謂吾州有異人嘗戴三朵花莫知其姓名郡人因以三朵花名之能作詩皆神仙意又能自寫真坡作詩曰畫圖要識先生面試問房陵好事家睂山道士羅勝先自號雲和山長善山水有古意然布置景物多越嶲夜郎所見蓋其人善地理遍厯諸山所以曲盡形勢又多作雨餘螮蝀可觀李時澤遂寧人初為僧受業於成都金地院因李隲顯夫喪其子京師顯夫親往迎喪拉與同行自是熟遊中原多觀古壁見武洞清所畫羅漢豁然曉解得其筆法兵亂歸蜀即以畫名圓悟住昭覺日大殿既成命畫十六羅漢及文殊普賢藥師菩薩等像見存楊大明字民瞻號至樂子關中將家棄廕走方外善畫龜蛇今丈人山道院藏經閣後壁有所作龜蛇廣丈餘最雄傑嘗為之罘蔡逮肩吾作息龜龜之六藏畫者止能為神屋而已而其妙處頭爪皴皵見於殼間鼻竅深潤觀者疑真息也寶覺和尚翎毛蘆雁不俗嘗畫一鶴王安上純甫一見以為薛稷筆取去元章畫史屢稱其能杭僧真慧畫山水佛像近世佳品翎毛林木有江南氣象米老嘗見其本牛形似虎也惠洪覺範能畫梅竹每用皂子膠畫梅於生絹扇上燈月下映之宛然影也其筆力於枝梗極遒健妙善師長寫貌嘗寫御容坡贈詩云天容玉色誰敢畫老師古寺晝閉房夢中神授心有得覺來信手筆已忘幅巾常服儼不動孤臣入門涕自滂元老侑坐鬢睂古虎臣侍立冠劍長仲仁會稽人住衡州華光山一見山谷出秦蘇詩卷且為作梅數枝及烟外逺山山谷感而作詩記卷末雅聞華光能墨梅更乞一枝洗煩惱寫盡南枝與北枝更作千峰倚晴吳又見其平沙逺水題云此超凡入聖法也每率此為之當冠四海而名後世乂題橫卷云髙明深逺然後見山見水蓋關同荆浩能事華光懶筆磨錢作鏡所見耳道臻嘉州石洞講師也能墨竹山谷贈序云道臻刻意尚行自振於溷濁之波故以墨竹自名然臻過與可之門而不入其室也道宏峩睂人姓楊受業於雲頂山相貌枯瘁善畫山水僧佛晚年似有所遇遂復冠巾改號龍巖𨼆者其族甚富宏不復顧止寄跡旅店惟一空榻雖被襆之屬亦無有每往人家畫土神其家必富畫猫則無鼠往往言人心事輒符合族婦烹魚宏命留食既去其姪不知輒先嘗宏歸視魚云此竊食之餘也婦方隱諱姪遂吐出先嘗於地又凡如厠必出郭五里外鄉人怪訝每隨而窺之既就溷則無復便利但立語再四而出此皆竒異者後竟坐化店中八十餘成都正法院法堂有所畫髙僧法能吳僧也作五百羅漢圖少游為之記云昔戴逵常畫佛像而自隱於帳中人有所否臧輒竊聽而隨改之積年而就意法能研思亦當若此非率然而為之决也雖然少游獨能察人之畫而不退思其作記時耶智平成都清凉院僧也善畫觀音南商毛大節得其像以歸過海風浪大作開展懇祈光相忽現如大月輪長久之間已數千里侯溥賢良載之觀音儀中今水陸院普賢閣所畫像其徒虛已作水石見存祖鑒成都僧住不動尊院師智平畫觀音今大慈超悟院佛殿有十觀音又於邛州鳯皇山畫觀音一日忽現五方圓相直閣計敏功為作瑞像記見存虛已成都柏林院僧善山水有圖軸傳世今白馬院僧慧琳本仕族多蓄圖書尊尚士大夫入慈藍者以為稅鞅之所翻香煮茗終日蕭然不知身在囂塵中也有虛已雪障及山水二圖甚佳覺心字虛靜嘉州夾江農家甚富少好游獵一日縱鷹犬棄妻子出家游中原作從犢圖詩孔南明崔德符見而愛之招來臨汝連住葉縣東禪及州之天寧香山三大剎兵亂還蜀邵澤民劉中逺兩侍郎復喜之請住毗盧凡十八年初作草蟲南僧稱為心草蟲後因宣和待詔一人因事匿香山心得其山水訣一日千里陳澗上稱之曰虛靜師所造者道也放乎詩游戲乎畫如烟雲水月出沒太虛所謂風行水上自成文理者也陳去非亦稱其詩無一㸃僧氣智源字子豐遂寧人傳法牛頭山攻雜畫尤長於人物山水嘗見看雲圖畫一髙僧抱膝而坐石岸昻首竚目蕭然有出塵之姿使人敬仰不暇風格其忘機之亞歟智永成都四天王院僧工小景長於傳模宛然亂真其印湘之匹亞歟初宇文季蒙龍圖喜其談禪欲請住院永牢辭曰智永親在未能也於是售已所長專以為養不免狥豪富㕓肆所好今流布於世者非其本趣也嘗作瀟湘夜雨圖上邵西山西山即題云嘗擬扁舟湘水西篷窗剪燭數歸期偶因勝士揮毫處却憶當年夜雨時西山既詠詩問永云前輩曾有此詩否永因誦義山問歸篇西山矍然亟取詩以歸翌日乃復改與之曾擬扁舟湘水西夜窗聽雨數歸期歸來偶對髙人畫却憶當年夜雨時深恐多犯前人也真休漢嘉僧也山谷所與遊清閒居士王朴之子善模搨人物如真今見存世胄婦女宦者附宋莊字臨仲漢傑之孫也其於山水氣韻得家法但筆未老耳本難列於世胄以世胄無可為冠者故屈而冠之賈公傑字千之文元公昌朝諸孫侍郎炎之子也學馬賁而標格過之又作佛像極精細衣縷皆描金而不俗官至半刺而終郭道卿字仲常游卿字季能熙之諸孫也皆為郡守頗有家學仍善畫馬其筆法真季孟也今成都正法保福兩院有壁傳窠植湖灘與渡水齕草帶鴉病馬等跡遂寧官圃中亦有松鹿石竹見存髙大亨字通叟宣仁聖烈之族公字行也以所降出身告誤為大亨故止名大亨長於山水澤民邵侍郎嘗邀致於家同郭季能兄弟合手畫圖障後卒於瀘錢端回戚里人也善寫平逺朱希真每借其名自諱曰敦儒非善畫者皆出端回手也李景孟字仲淳善畫馬其於圖軸鑒别精確蓋中原故家聞見之多也邵少微字叔才澤民侍郎之子也放曠不羈不樂從宦初為馬曹不一月棄官去則取補官敕牒盡畫飛潛走伏之物已乃抵於地遂致終身焉筆墨草具而有餘意睂倅㕔壁有烟林窠石對宋頥仲所作松石皆存李元崇字季姚文正公裔無盡之甥也官止縣令生平好畫成癖因自能之師范寬清潤可喜尤工雪景士友求之欣然下筆頃刻而就未嘗作難此其所長也王㑹字元叟端明公之長子今為朝請大夫工花竹翎毛頗拘院體蘂葉枝莖觜爪毛羽窮極精細不遺毫髮也李蕃字元翰成都人才元之曾孫也李氏世以書鳴蕃得其家學轉而為畫種種能之寶相院門天王二壁實出其手全體聖壽寺范瓊樣但蕃不善布色以俗工代之反晦其所長耳後十年又用青城山長生觀門龍虎君樣翻天王二壁於青蓮院門且自傅彩遂勝於前也朝議大夫王之才妻崇德郡君李氏公擇之妹也能臨松竹木石見本即為之卒難辨又與可每作竹以貺人一朝士張潛迂疏修謹作紆竹以贈之如是不一又作一橫絹丈餘著色偃竹以貺子瞻過南昌山谷借而李臨之後數年示米元章於真州元章云非魯直自陳不能辨也作詩曰偃蹇宜如李揮毫已逼翁衛書無遺妙琰慧有餘工熟視疑非筆初披颯有風固藏惟謹鑰化去或難窮山谷亦有題姨母李夫人墨竹偃竹及墨竹圖歌詩載集中和國夫人王氏顯恭皇后之妹宗室仲輗之室也善字畫能詩章兼長翎毛每賜御扇即翻新意仿成圖軸多稱上㫖一時宫邸珍貴其蹟文氏湖州第三女張昌嗣之母也居郫湖州始作黃樓障欲寄東坡未行而湖州謝世遂為文氏奩具文氏死復歸湖州孫因此二家成訟文氏嘗手臨此圖於屋壁暮年盡以手訣傳昌嗣今昌嗣亦名世矣章友直之女煎能如其父以篆筆畫棊盤筆筆相似任才仲妾艷艷本良家子有絶色善著色山才仲死遇賊不知所在陳暉晦叔經略子婦桐廬方氏作梅竹極清逺又臨蘭亭并自作草書俱可觀魏觀察者政宣之宦寺也善畫墨竹嘗被㫖來衛州起御前竹入林竹中有籠中飛鳥名遏濫堆能歌六么遂呼其主問之主人年已七十矣云初教時以木匣束其身每五鼓吹其脣作腔筆管敲拍以警其睡如是五六年方能之前後凡數十獨無此之慧者强欲求之不可以貨取之不可以官酬之又不可遂封其籠以黃帕翁不敢近自撲於地而死任源字道源自號真常子政宣宦者死於紹興間作枯木怪石又作小景粗可觀畫繼卷五
