body:
  text: 畵繼卷四宋鄧椿撰搢紳韋布劉明復蔣長源鄢陵王主簿李世南趙宗閔薛判官倪濤文勛劉延世王持王利用靳東發子詠魏燮李昭李頎陳直躬朱象先張無惑睂山老書生何充雍秀才章友直黄斌老黄子舟劉明仲黄與廸楊吉老成子張逺張明王元通喬仲常孔去非閭丘秀才劉松老王逸民馮乆照劉履中劉真孺李皓張昌嗣連鼇任粹楊補之雍巘劉明復為直龍圖閣師李成特細秀作松枝而無向背荆楚秀甚浮休有鄧正字宅見劉明復所畫麓山秋景五十六言云洛陽才子見長沙自識中丹鬢未華文武全才皆不試丹青妙筆更誰加老杉列在皇堂上小景将歸學士家我有故山常自寫免敎魂夢落天涯蔣長源字永仲官至大夫作著色山水山頂似荆浩松身似李成葉取真松為之如靈鼠尾大有生意石不甚工作凌霄花纒松亦佳鄢陵王主簿未審其名長於花鳥東坡有書所畵折枝二詩其一云論畵以形似見與兒童鄰作詩必此詩定非知詩人詩畵本一律天工與清新邊鸞雀寫生趙昌花傳神如何此兩幅疎淡含精匀誰言一㸃紅解寄無邊春二云瘦竹如幽人幽花如處女低昻枝上雀摇蕩花間雨雙翎決起時衆葉紛自舉可憐採花蜂清蜜寄兩股若人富天巧春色入毫楮懸知君能詩寄聲求妙語李世南字唐臣安肅人明經及第終大理寺丞嘗與晁无咎同試諸生无咎有求横幅長篇又有題扇詩葢長於山水也東坡亦嘗題其秋景平逺云人間斤斧日創夷果見龍蛇百尺姿不是溪山曾獨往何人解作挂猿枝野水參差落漲痕疎林欹倒出霜根浩歌一棹歸何處家在江南黄葉村予嘗見其孫皓云此圖本寒林障分作兩軸前三幅盡寒林坡所以有龍蛇姿之句後三幅盡平逺所以有黄葉村之句其實一景而坡作兩意又浩歌字雕本皆以為扁舟其實畵一舟子張頥鼓枻作浩歌之態今作扁舟甚無謂也趙宗閔為尚書郎山谷載銅官僧舍墨竹一枝筆勢妙天下為作小詩云省郎潦倒今何處敗壁風生雙竹枝滿世閻劉專翰墨誰為真賞拂蛛絲又云獨来野寺無人識故作寒崖雪壓枝想得平生藏妙手只今猶在鬢成絲薛判官者不得其名浮休題其所作秋溪烟竹云深墨畵竹竹明白淡墨畵竹竹帶烟髙堂忽爾開數幅半隠半見如自然者是也倪濤字巨濟宣和間為都司一日訪其友戯畵三蠅壁間自題云何人刻獼猴老眼覷荆棘不如丹青手快意風雨疾我窮坐詩豪九鼎扛筆力偶然一㸃汚著紙生羽翼千言走蚍蜉寕為寸紙逼還當寫君詩什襲同藏羃今李文正之孫有所畵蜥蜴蝀蟾甚佳文勛字安國元祐末作太府寺丞福建漕東坡䟦其畵扇云道子畵西方變相觀者如堵作佛圓光風落電轉一揮而成嘗疑其不然今觀安國作方界略不抒思乃知傳者之不謬劉延世公是先生之猶子也少有盛名元祐初游太學不得志築堂講業名曰抱甕嘗作墨竹題詩云酷愛此君心嘗將墨㸃真毫端雖在手難寫淡精神乂云靜室焚香盤膝坐長廊看畵散衣行趣尚之髙有如此者王冲𨼆名持字正叔長安人長於翎毛學崔白今顔魯公鹿脯帖有題䟦妙於筆法葢其人也嘗於邵氏見竹棘雪禽二軸極清雅上題云正叔為伯起作崇寜甲申伯起名振其兄也王利用字賔王潼川人舉進士終䕫憲書畵皆能光堯皇帝頗愛其書畵則山水長於人物精謹而已不及其書也靳東發字茂逺其髙祖太尉即射撻覽者官止叙倅其性多能尤工畵藝人目之為靳百會近世畵手少作故事人物頗失古人規鑒之意茂逺獨集古今諌諍百事以為圖號百諌圖誠可尚者詠字少張其子也今主簿于郫長於山水尤為多能葢其出藍之青也魏燮字彦宻北人長於水墨雜畵光堯見之喜動天顔遂除浙西參議李昭字晉傑鄄城人李文靖之曽孫蔡文忠公曽外孫也以恩科仕江州徳化尉長於墨竹自云他人以蕭疎為能余以重宻為巧吾之墨竹一派不讓湖州又善墨花小筆亦能山水學范寛篆尤精學三墳記也紹興間死於江南李頎秀才善畵山嘗以兩軸并詩上東坡東坡次其韻答之平生自是箇中人欲向漁舟便寫真詩句對君難出手雲泉勸我早收身年来白髮驚秋速長恐青山與世新從此北歸休悵望囊中收得武陵春陳直躬髙郵人也坡有題所畵雁二詩云野雁見人時未起意先改君從何處㸔得此無人態者是也而无咎集中有和蘇翰林題李甲畵雁二首乃用此韻不知何謂也朱象先字景初松陵人馳名紹聖元符間坡䟦其畵云能文而不求舉善畵而不求售文以逹吾心畵以適吾意而已以其不求售也故得之自然世亦罕見不知其所長也張無惑山人也善畵山水浮休贈詩云西征已度故闗山秋雨零零路屈盤受盡艱辛心不足解程又展畵圖㸔睂山老書生不得其名作七才子入闗圖山谷謂人物亦各有意態以為趙雲子之苖裔摹寫物象漸密而放浪閒逺則不逮也何充秀才不知何許人能寫貌坡有贈詩云問君何苦寫我真君言好之聊自適雍秀才不知何許人坡有詠所畵草蟲八物詩詩意每一物譏當時用事者一人如升髙不知囘竟作黏壁枯以比介甫初来花爭妍倐去鬼無跡以比章惇今詩與畵俱刋石流傳於世又作畵捕魚圖賛載集中章友直字伯益善畵龜蛇以篆筆畵頗有生意又能以篆筆畵棊盤筆筆相似黄斌老不記名潼川府安泰人文湖州之妻姪也登科嘗任戎倅適山谷貶戎州與定交且通譜善畵竹山谷有詠其横竹詩又謝斌老送墨竹十二韻云吾子學湖州師逸功已倍預知更入神後出遂無對黄彞字子舟斌老之弟其名字初非彞與子舟也山谷以其尚氣故取二器以規之自後折節遂為粹君子舉八行終朝郎郡倅山谷用贈斌老韻謝子舟為余作風雨竹兩篇前篇云歳寒十三本與可可追配後篇云森削一山竹牝牡十三輩誰言湖州没筆力今尚在而與可每言所作不及子舟劉明仲善作竹山谷為作墨竹賦黄與廸善墨竹山谷次韻謝與廸所作竹五幅云吾宗墨脩竹心手不自知但不知為何人任子淵詩註亦不及之楊吉老文潛甥也文潛嘗云吾甥楊吉老本不好畵竹一旦頓解便有作者風氣揮灑奮迅初不經意森然已成惬可人意其法有未具而生意超然矣无咎亦有贈文潛甥克一學與可畵竹詩克一吉老字也成子不得其名山谷詩云成子寫浯溪下筆便造極徐師川亦有成生畵山水歌云成子貌古心亦古造化為工筆端取𤣥冬起雷夏造氷翻手為雲覆手雨張逺字行之太原榆次人本士人隱居山間政和中有河東漕宋姓者親訪其廬邀致公署令畵絹八幅逺請屏去左右且約漕無相見獨與弟子郝士安評議酣寢數日忽起下筆頗窮天真兩幅不如意遂焚之以六幅與宋宋大喜贈送甚厚髙謝還廬張明其妷也亦以山水擅名比季父則差肩矣王元通以字稱工山水滄州人也師李成為人豪逸自負每畵竟輒大呼竒竒數聲乃得意筆也喬仲常河中人工雜畵師龍眠圍城中思歸一日作河中圖贈邵澤民侍郎至今藏其家又有龍宫散齋手軸山居羅漢淵明聽松風李白捉月𤣥真子西塞山列子御風等圖傳於世孔去非汝州寧極先生之後也長於小筆清雅可玩尤工草蟲作蟻蝶蜂蟬竹雀甚可觀平生極留意於此凡翹蠕飛動之物必募小兒求之搜索無遺以類置其翅羽冊葉中按形為之纎悉畢具閭丘秀才江南人不記名長於畵水無所宗師自成一家嘗畵五嶽觀壁凡作水先畵浪頭然後畫水紋頃刻而成驚濤洶湧勢欲掀屋劉松老字榮祖書學元章畵師東坡成都李才元家有四軸山水上有印文云巨濟震子名松老者八字可見其髙怪不隨俗也成都佛掌骨記實榮祖筆特借米老名耳予見此本在張恭州彌明家後歸一豪族價三十萬非真物也王逸民字逸民永康導江人初為僧名紹祖詩畵俱倣周忘機而氣韻懸絶也平生頗負氣政和間改徳士則云我生不背佛而從外道取祠部牒焚之自加冠巾學山谷草書亦美觀馮乆照字明逺汾州人也少遊太學兵亂入蜀寓居渠州其山水初頗繁冗後因郭熈之孫游卿来為太守盡以其家學傳之遂一變趙相鼎與之有太學之舊薦於川路監司由是益得名劉履中字坦然汴人也寓遂寜靈泉山趾壁傳人物筆勢雄特今遂寧后土祠殿廡内外盡出其手仙佛圖軸亦其所長但作故事人物未脱工氣也劉銓字真孺成都人察院濬卿之族也家本豪富性好畵所居對聖壽寺寺多唐蜀名迹真孺終日諦翫至忘飲食乆而自能所畵山水多以布紋印科葉者唐舊製葢得於壁間也尤精佛像描墨成染與李道明無異清勁則過之李皓字雲叟唐臣孫也避亂入蜀居成都其所作山水取前輩成様合而為一故能美觀一時翕然稱之張昌嗣字起之與可之外孫也筆法既有所授每作竹必乘醉大呼然後落筆不可求或強求之必詬罵而走然有愧宅相者於攅三聚五太拘拘耳連鼇字仲舉吉州人自號石䑓居士精於長短句工畵魚㡬於徐白紹興間人任粹秀才仲之姪能作著色山楊補之字无咎洪州人長於水墨人物祖伯時今年七十矣自號逃禪老人雍巘字㓜山興元人善山水作巖崖枯木雲氣墨梅尤佳舉進士屢免畫繼卷四
