body:
  text: 畵繼卷二宋鄧椿撰侯王貴戚鄆王令穰令松叔盎士雷宗漢士暕士衍士遵伯駒士安子澄王詵鄆王徽宗皇帝第二子也稟資秀拔為學精到政和八年射䇿於廷名標第一多士推服性極嗜畵頗多儲積凡得珍圖即日上進而御府所賜亦不為少復皆絶品故王府畵目至數千計又復時作小筆花鳥便面克肖聖藝乃知父堯子舜趣尚一同也今秘閣畵目有水墨筍竹及墨竹蒲竹等圖光州防禦使令穰字大年雅有美才髙行讀書能文少年因誦杜甫詩見唐人畢宏韋偃志求其蹟師而寫之不歳月間便能逼真時賢稱歎以為貴人天質自異意所專習度越流俗也其所作多小軸甚清麗雪景類世所收王維筆汀渚水鳥有江湖意又學東坡作小山叢竹思致殊佳但覺筆意柔嫩實年少好竒耳若稍加豪壯及有餘味當不在小李將軍下也每作一圖必出新意人或戲之曰此必朝陵一畨囘矣葢譏其不能逺適所見止京洛間景不出五百里内故也大年既得名誅求剋期無少暇時擲筆大慨曰藝之役人如此然業已得名無可奈何山谷嘗詠其蘆㕍云揮毫不作小池塘蘆荻江村雁落行雖有珠簾巢翡翠不忘烟雨罩鴛鴦然初䟦其畵謂更屏聲色裘馬使胸中有數百卷書當不愧文與可葢見其少作耳自今觀之其亦有宋之江都王滕王耶令松字永年大年弟也亦善丹青浮休居士謝大年江天晩景圖雜言云神妙獨數李將軍安知伯仲非前身則知其弟兄俱能且筆墨俱得思訓格也又山谷䟦其畵夾云調麝煤作花果殊難工永年遂臻此殊不易然作朽蠧太多是其小疵又云永年作狗意態甚逼遣翰林工訖其草石不敢畵虎憂狗之似故直作狗人難我易叔盎字伯充善畵馬嘗以其藝并詩投東坡東坡次其韻云天驥徳力備馬外龍麟中皇天不遣言兀與畵圖同駑駘飽官粟未受一洗空十駕均一至何事籋雲風士雷字公震長於山水清雅可愛李錞希聲跋其四時景絶句則可知其風㫖矣春云九江應共五湖連尺素能開萬里天山杏野桃零落處分明寒食曉風前夏云繁隂雜樹映汀沙三伏江天自一家欲喚扁舟渡雲錦平鋪明鏡是荷花秋云舂鉏寂寞繞疎樷霜後雲生浦溆風此處年年報秋色只應衰柳與丹楓冬云剪水飛花細舞風斷蘆洲外水連空剡溪㡬曲知名處何似今朝眼界中今秘閣畵目有春雪早梅及小景等圖嗣濮王宗漢字獻甫安懿王㓜子也少即敏慧儀矩端荘作蘆雁有佳思朱元章題詩曰偃蹇汀眠雁蕭梢風觸蘆京塵方滿眼速為喚花奴又曰野趣分弱水風花剪鑑湖塵中不作惡為有鄴公圖元章許予甚嚴詩意如此則可知其含毫運思矣嘗有八雁圖識者歎賞其工士暕字明發讀書能文元符初試宗室藝業合格者八人獨明發賜進士出身嘗作春詞烏夜啼埽除凡語飄然寄興於烟霞之外至今流傳推為雅什兼工畵藝後山居士題其髙軒過圖詩曰滕王蛺蝶江都馬一紙千金不當價異才天縱非力窮畵工不足甘為下今代風流數大年含毫落筆開山川忽忘朽老壓塵底却怪鳬鴻墮目前爾來八二復秀出萬里河山才咫尺眼邊安得有突兀復似天地初開闢其卒云未許二豪今角立則其髙情雅韻自宜追配今昔也士衍號花一相公長於著色山水宣和初進十圖特轉一官犍為王瑾家有扇面意韻誠可喜愛然少見於世瑾即其甥也故得之士遵光堯皇帝皇叔也善山水紹興間一時婦女服飾及琵琶筝面所作多以小景山水實倡於士遵然其筆超俗特一時倣傚宫中之化非專為此等作也伯駒字千里優於山水花果翎毛光堯皇帝嘗命畫集英殿屏賞賚甚厚多作小圖流傳於世有所畵蟠檜怪石便面在吉州團練使楊可弼良卿家官至浙東路鈐轄其弟路分伯驌字希逺亦長山水花木著色尤工士安長於墨竹不遵川𣲖好作筀竹殊秀潤與石室體製大異也子澄字處度廉介修潔流落巴峽四十年藉添差祿以自給善草𨽻長歌詩人不知其能畵也紹興末官秭歸士子重其風度毎載酒從之游一日乗醉入小肆見素壁可愛案上拈秃筆作濺瀑勢欲動屋筆力極遒壯也王詵字晉卿尚英宗女蜀國公主為利州防禦使雖在戚里而其被服禮義學問詩書常與寒士角平居攘去膏􅆝黜逺聲色而從事於書畵作寳繪堂於私第之東以蓄其所有而東坡為之記東軒亦贈詩云錦囊犀軸堆象床义竿連幅飜雲光手披横素風飛揚卷舒終日未用忙游意澹泊心清凉屬目俊麗神激昻其所畵山水學李成皴法以金綠為之絶似今觀音寳陀山状小景亦墨作平逺皆李成法也故東坡謂晉卿得破墨三昧有烟江疊嶂圖房相宿因圖及山隂陳迹雪溪乗興四明狂客西塞風雨圖著色山水等圖傳於世畫繼卷二
