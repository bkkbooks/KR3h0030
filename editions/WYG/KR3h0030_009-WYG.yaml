body:
  text: 畫繼卷九宋鄧椿撰雜説論逺畫者文之極也故古今之人頗多著意張彦逺所次厯代畫人冠裳大半唐則少陵題詠曲盡形容昌黎作記不遺毫髪本朝文忠歐公三蘇父子兩晁兄弟山谷後山宛丘淮海月巖以至漫士龍眠或評品精髙或揮染超㧞然則畫者豈獨藝之云乎難者以為自古文人何止數公有不能且不好者將應之曰其為人也多文雖有不曉畫者寡矣其為人也無文雖有曉畫者寡矣畫之為用大矣盈天地之間者萬物悉皆含毫運思曲盡其態而所以能曲盡者止一法耳一者何也曰傳神而已矣世徒知人之有神而不知物之有神此若虚深鄙衆工謂雖曰畫而非畫者葢止能傳其形不能傳其神也故畫法以氣韻生動為第一而若虚獨歸於軒冕巖穴有以哉自昔鑒賞家分品有三曰神曰妙曰能獨唐朱景真撰唐賢畫録三品之外更増逸品其後黄休復作益州名畫録乃以逸為先而神妙能次之景真雖云逸格不拘常法用表賢愚然逸之髙豈得附於三品之末未若休復首推之為當也至徽宗皇帝專尚法度乃以神逸妙能為次予嘗取唐宋兩朝名臣文集凡圖畫紀詠考䆒無遺故於羣公略能察其鑒别獨山谷最為精嚴元章心眼髙妙而立論有過中處少陵東坡兩翁雖注意不專而天機本髙一語之確有不期合而自合者杜云妙絶動宫牆則壁傳人物須動字始能了請公放筆為直幹則千丈之姿於用筆之際非放字亦不能辦至東坡又曲盡其理如始知真放本細㣲不比狂華生客慧當其下筆風雨快筆所未到氣已吞非前身顧陸安能道此等語耶予作此錄獨取髙雅二門餘則不苦立褒貶葢見者方可下語聞者豈可輕議嘗考郭若虛論成都應天孫位景朴天王曰二藝争鋒一時壮觀傾城士庶㸔之闐噎予嘗按圖熟觀其下則知朴務變怪以傚位正如杜黙之詩學盧仝馬異也若虚未嘗入蜀徒因所聞妄意比方豈為歐陽炯所誤耶然有可恕者尚注辛顯之論謂朴不及位逺甚葢亦以傳為疑也此予所以少立褒貶郭若虚所載往往遺略如江南之王凝花鳥潤州僧修範湖石道士劉貞白松石梅雀蜀之童祥許中正人物仙佛丘仁慶花王延嗣鬼神皆名筆也俱是熙寕以前人物山水家畫雪景多俗嘗見營丘所作雪圖峰巒林屋皆以淡墨為之而水天空處全用粉填亦一竒也予每以告畫人不愕然而驚則莞爾而笑足以見後學者之凡下也李營丘多才足學之士也少有大志屢舉不第竟無所成故放意於畫其所作寒林多在巖穴中裁劄俱露以興君子之在野也自餘窠植盡生於平地亦以興小人在位其意㣲矣宇文龍圖季蒙云宣和御府曝書屢嘗預觀李成大小山水無數軸今臣庶之家各自謂其所藏山水為李成吾不信也畫之六法難於兼全獨唐吳道子本朝李伯時始能兼之耳然吳筆豪放不限長壁大軸出竒無窮伯時痛自裁損只於澄心紙上運竒布巧未見其大手筆非不能也葢實矯之恐其或近衆工之事米元章云伯時病臂三年予始畫雖似推避伯時然自謂學顧髙古不使一筆入吳生專為古忠賢像其木強之氣亦不容立伯時下矣鳥獸草木之賦状也其在五方自各不同而觀畫者獨以其方所見論難形似之不同以為或小或大或長或短或豐或瘠互相譏笑以為口實非善觀者也蜀雖僻逺而畫手獨多於四方李方叔載徳隅齋畫而蜀筆居半德麟貴公子也蓄畫至數十函皆留京師所載止襄陽隨軒絶品多已如此蜀學其盛矣哉畫之逸格至孫位極矣後人往往益為狂肆石恪孫太古猶之可也然未免乎麤鄙至貫休雲子軰則又無所忌憚者也意欲髙而未嘗不卑實斯人之徒歟蜀之羅漢雖多最稱盧楞伽其次杜措丘文播兄弟耳楞伽所作多定本止坐立兩様至於侍衞供獻花石松竹羽毛之屬悉皆無之不足觀杜丘雖各有此而筆意不甚清髙俱愧長沙之武也舊説楊惠之與吳道子同師道子學成惠之恥與齊名轉而為塑皆為天下第一故中原多惠之塑山水壁郭熈見之又出新意遂令圬者不用泥掌止以手槍泥於壁或凹或凸俱所不問乾則以墨隨其形跡暈成峰巒林壑加之樓閣人物之屬宛然天成謂之影壁其後作者甚盛此宋復古張素敗壁之餘意也大抵收藏古畫往往不對或斷縑片紙皆可珍惜而又髙人逹士恥於對者十中八九而俗眼遂以不成器目之夫豈知古畫至今多至五百年少至二三百年那得復有完物斷金碎玉俱可寳也榮輯子邕酷好圖畫務廣藏蓄每三伏中曝之各以其類循次開展徧滿其家每一種日日更換旬日始了好事家鮮其比也聞之故老曰承平時有一不肖子質畫一匣於人家凡十餘圖每圖止各有其半或横或竪當中分剪如維山戴特徐熙芙蓉桃花崔白翎毛無一全者葢其家兄弟不義之甚凡物皆如是分之以為不如是則不平也誠可傷歎畫繼卷九
