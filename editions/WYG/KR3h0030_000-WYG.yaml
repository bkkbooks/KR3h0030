body:
  text: 畫繼藝術類一書畫之屬提要臣等謹案畫繼十卷宋鄧椿撰椿雙流人祖洵武政和中知樞宻院事時最重畫學椿以家世聞見綴成此書其曰畫繼者唐張彦逺作厯代名畫記起軒轅止唐會昌元年宋郭若虚作圖畫見聞志起會昌元年止宋熙寧七年椿作此書起熙寧七年止乾道三年用續二家之書故曰繼也所録上而帝王下而工技九十四年之中凡得二百一十九人一卷至五卷以人分曰聖藝曰侯王貴戚曰軒冕材賢曰巖穴上士曰搢紳韋布曰道人衲子曰世胄婦女及宦者各為區分類别以總括一代之技能六卷七卷以畫分曰仙佛鬼神曰人物傳寫曰山水樹石曰花竹翎毛曰畜獸蟲魚曰屋木舟車曰蔬果藥草曰小景􅇎畫各為標舉短長以分闡諸家之工巧盖互相經緯欲俾一善不遺八卷曰銘心絶品記所見竒跡愛不能忘者為書中之特筆九卷十卷曰􅇎説分二子目一曰論逺皆品評繪事一曰論近皆録宋時畫家􅇎事其論逺之末忽綴宋時􅇎事一條疑傳寫亂其次也椿以當代之人記當代之藝所收自未免稍寛故其迹多不傳于世迄今有不知其姓名者然觀其所品不取徽宗時畫院之格物守法度亦不取石恪等之縱佚規矩頗為平允又網羅賅備俾後來得以考核固賞鑒之家所據為左騐者矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀畵繼原序自昔賞鑒之家留神繪事者多矣著之傳記何止一書獨唐張彦逺總括畫人姓名品而第之自軒轅時史皇而下至唐會昌元年而止著為歴代名畫記本朝郭若虚作圖畫見聞誌又自會昌元年至神宗皇帝熈寜七年名人藝士亦復編次兩書既出他書為贅矣予雖生承平時自少歸蜀見故家名勝避難於蜀者十五六古軸舊圖不期而聚而又先世所藏殊尤絶異之品散在一門往往得免焚刼猶得披尋故性情所嗜心目所寄出於精深不能移奪每念熈寕而後游心兹藝者甚衆迨今九十四春秋矣無復好事者為之紀述於是稽之方冊益以見聞參諸自得自若虛所止之年逮乾道之三禩上而王矦下而工技凡二百一十九人或在或亡悉數畢見又列所見人家竒迹愛而不能忘者為銘心絶品及凡繪事可傳可載者裒成此書分為十卷目為畫繼若虛雖不加品第而其論氣韻生動以為非師可傳多是軒冕才賢巖穴上士髙雅之情之所寄也人品既已髙矣氣韻不得不髙氣韻既已髙矣生動不得不至不爾雖竭巧思止同衆工之事雖曰畵而非畵嗟夫自昔妙悟精能取重於世者必凱之探㣲摩詰道子等輩彼庸工俗𨽻車載斗量何敢望其青雲後塵耶或謂若虛之論為太過吾不信也故今於類特立軒冕巖穴二門以寓㣲意焉鑒裁明當者須一肯首是年閏旦華國鄧椿公壽序
