body:
  text: 畵繼卷六宋鄧椿撰仙佛鬼神劉國用陳自然于氏雷宗道能仁甫費宗道成宗道吉祥司馬冦楊傑鄭希古張通人物傳寫李士雲程懐立朱漸朱宗翼徐確劉宗道杜孩兒山水林石燕文季陳用之王可訓李明池州匠蔡規李宗晟兼至誠賀真寗濤寗乆中髙洵馮曠何淵劉翼宋處李逺郝士安張舉趙林郭鐵子老成李希成田和蒙亨李唐戰徳淳和成忠劉仲先劉堅郝孝隆李覺花竹翎毛尹白劉常張涇陳常張希顔任源費道寜楊寵楊祁李猷韓若拙孟應之宣亨老麻胡竒鮑洵鮑洋盧章李端劉益富燮夏奕田逸民李誕仙佛鬼神劉國用漢州人工畵羅漢壁素之傳甚多在丘杜金水張之下也陳自然工畵佛山谷題云陳君以佛畵名京師作秋水寒禽甚可觀于氏不記名河東人寓閬州工佛道像兼畵鬼神雷宗道商州人工雜畫尤長於佛像山水雙流張庭堅家有兩横軸人以為郭熈也能仁甫以字行本畵院出身官至縣令長於佛像山水世多觀音費宗道蔡州人来京師畵太一宫中主火神頃刻而成衆工疾之告監牧中使曰畵太速成殊不加意中使遂令墁毁一夕憤怒而卒成宗道長安人工畵人物兼善刻石凡長安壁傳吳筆皆臨摹上石其跡細如絲髪而不失精神體段有所集吳生三清像與左右侍衛宛如吳作或云因能勒石後轉而為畵也又改武洞清長沙羅漢與三元皆能捨短求長自出新意過於長沙逺矣吉祥平陽人工佛道筆墨輕清又能布景作佛像星辰多在山水中後人罕及山水亦佳司馬冦汝州人佛像鬼神人物種種能之宣和間稱第一手多畵翊聖真武於雲霧中現半身觀者駭敬士大夫奉事皆有靈應楊傑閬州人長於鬼神每下筆必先畫手足四支然後用三兩筆成就全體鄭希古河東人長於平畵每出新意輒過人初未甚精紹興初遇郝章於閬州居相近一日章病希古視候甚謹病已章感其誠盡傳其法張通鄜延人長於仙佛初居利州今居興元人物傳寫李士雲金陵人傳荆公神贈詩曰衰容一見便疑真李氏揮毫妙入神欲去鍾山終不忍謝渠分我死前身又善山水荆公贈古風有李子好山水而常寓城郭毫端出􅆼窕心手初不著之句程懐立南都人東坡作傳神記謂傳吾神衆以為爾得其全者懐立舉止如諸生蕭然有意於筆墨之外者也朱漸京師人宣和間寫六殿御容俗云未滿三十歳不可令朱待詔寫真恐其奪盡精神也朱宗翼畵院人也嘗與任安合手畵慕容夫人宅堂影壁神州圖樓觀屋木任安主之山水人物宗翼主之徐確不知何許人今居臨安供應御前傳寫名播中外劉宗道京師人作照盆孩兒以水指影影亦相指形影自分每作一扇必畵數百本然後出貨即日流布實恐他人傳模之先也杜孩兒京師人在政和間其筆盛行而不遭遇流落輦下畵院衆工必轉求之以應宫禁之須山水林石燕文季神廟時人工畵山水清雅秀媚予家舊有花村曉月平江晚雨竹林暮靄松溪殘雪四時景畵院謂之燕家景陳用之居小窑村善山水宋復古見其畵曰此畵信工但少天趣耳先當求一敗牆張絹素倚之牆上朝夕觀之既乆隔素見敗牆之上髙平曲折皆成山水之勢心存目想髙者為山下者為水坎者為谷缺者為澗顯者為近晦者為逺神領意造恍然見其有人禽草木飛動往来之象則隨意命筆自然景皆天就不類人為是為活筆用之感悟格遂進予按存中筆談故録用之而郭誌亦有小窑陳名用智豈用之耶王可訓京西人熈豐待詔也工山水自成一家曾作瀟湘夜雨圖實難命意宋復古八景皆是晩景其間烟寺晚鐘瀟湘夜雨頗費形容鐘聲固不可為而瀟湘夜矣又復雨作有何所見葢復古先畵而後命意不過略具掩靄慘淡之状耳後之庸工學為此題以火炬照䌫孤燈映船其鄙淺可惡至於形容不出而反嘲誚云不過剪數尺皂絹張之堂上始副其名也可訓之作悉無此病李明善山水坡嘗以其畵送吳逺遊云近李明畵山水有名頗用墨不俗輒求得一横卷甚長可用床上繞屏池州匠作秋浦九華筆麤有清趣師董源蔡規建昌軍人謝無逸觀其畵山水有蔡生老江南山水涵眼界揮灑若無心筆端出萬怪之句李宗晟作水簾圖坡題云宗晟一軸水簾圖寄與南舒李大夫未向林泉歸得去炎天酷日且令無兼至誠不知何許人大觀初得㫖以至誠進所畵山水意匠精深筆法髙古特補將仕郎賀真延安人出自戎籍專門山水宣和初建寳真宫一時名手畢呈其技有忌真者推為講堂照壁實難下手真亦不辭日醉酒於門衆工皆畢中使促真真以幕圍壁揮却其徒不數日成作雪林髙八尺觀者嗟賞衆工斂袵寗濤華隂敷水人師范寛多作闗右風景其巧過寛而渾厚藏蓄不及也但樓觀人物纎悉畢呈失於太顯正如髙克明人謂馬行家山水也寗乆中濤子也又兼畵人物深得出俗之態筆意不減其父但多平逺道路之景不起峰頂耳髙洵京師人工山水師髙克明尤長於湖石以畵院多學克明故洵晚年復師范寛馮曠河内人工山水體製不類前人自成一家馳名於熈豐間其筆墨蒼老峰巒秀潤亦為難及也何淵在圖畵院不知何處人專師克明往往逼真然失之繁碎也劉翼耀州呼為劉評事學范寛而有自得處不知者以為寛筆宋處不記名邢州人州署有郭熈滿溪春溜圖乃宋所模其名見林泉髙致李逺青州人學營丘氣象深逺崇觀間馳名郝士安太原榆次人張逺之弟子也事其師甚敬常執杖屨侍立左右張舉懐州人亦山水家其性不羈好飲酒與群小日游市肆作鼔板社每得畵貲必盡於此尤長濺撲趙林字子安懐州人李士舉提刑家有林所畵不凋圖步驟營丘然方籍籍間遽以疾亡聞者惜之郭鐵子太原榆次人學李成善鍜鐵作方響故號為鐵子老成洺州臨洺人熈豐間工雜畵尤長山水其性沉静終日兀坐似不能言者筆法謹細如其為人年八十餘而終李希成華州人慕李成遂命名初入圖畵院能自晦以防忌嫉比己補官始出所長衆雖睥睨無及矣田和陜人學李成意韻深逺筆墨精簡熈豐間罕能及者蒙亨華州人初為僧兵火後偶其兄從軍遂置軍中屯綿州學其鄉人寗濤得典刑也李唐河陽人亂離後至臨安年已八十光堯極喜其山水戰徳淳本畵院人因試蝴蝶夢中家萬里題畵蘇武牧羊假寐以見萬里意遂魁能著色山人物甚小青衫白袴烏巾黄履不遺毫髪又作紅花綠桞清江碧岫一扇之間動有十里光景真可愛也和成忠京西人宣和待詔不記名成忠其官也學李成筆墨温潤病在烟雲太多爾劉仲先成都人善山水昭覺方丈僧堂内外皆仲先筆時年七十矣今存瀟湘劉堅頗柔媚師范寛樓閣人物種種皆工多作小圖無豪放之氣郝孝隆太原人師李成今成都信相寺有所畫四壁可觀李覺京師人字民先自號方平九友能書能琴能占甞為明節皇后閤掌牋後流落於廣州長於山水每被酒則綳素於壁以墨潑之隨而成象曲盡自然之態花竹翎毛尹白汴人専工墨花坡嘗賦之云花心起墨暈春色散毫端劉常江南人所作花氣格清秀有生意在趙昌王友上張涇不知何處人米元章稱其翎毛蘆雁不俗陳常江南人以飛白筆作樹石有清逸意折枝花亦有逸氣一株以色亂㸃花頭意欲奪造物本朝妙工也張希顔漢州人初名適大觀初累進所畫花得㫖麄似可采特補將仕郎畫學諭希顔始師趙昌後到京師稍變從院體得蜀州推官以歸不勝士大夫之求多令任源代作故復似昌任源漢州人少𨽻軍籍從希顔乆盡得其法費道寜懐安人善畫花多作交枝比趙昌有筆格楊寵成都人善畫花可亞費道寜楊祁彭州崇寜人善花竹翎毛有百禽帳又畫籠雞如生昭覺寺超然堂舊有倦翼知還等壁今不復存李猷河内人長於鷹鶻精神態度曲盡其妙世所作多搏搦狐兎鳬鷺之屬流血淋漓頗乖好生之意猷盡反之嘗見其畫二鷹坐於枯枝之上貌甚閒暇略無鷙猛慘烈之状而不失英姿勁氣可尚也韓若拙洛人善作翎毛每作一禽自觜至尾足皆有名而毛羽有數政宣間兩京推以為絶筆又能傳神宣和末應募使髙麗寫國王真會用兵不果行年八十餘死襄陽孟應之不知何許人入圖畫院精於翎毛嘗見其畫扇作秋老海棠子著枝已乾而不枯猶帶生意生一白頭翁生動宣亨京師人乆在畫院承平時入蜀終普州兵官精花鳥初離院時徽宗留之亨牢辭而去既出當塗命畫者甚衆不勝煩勞頗厭苦之每云上嘗戒我勿出必為措大所殃今果然也老麻闗中人熈寕間以花鳥稱非蜀之居禮也胡竒長安人長於蘆雁何丞相文縝家有四幅圖可觀鮑洵京西人工花鳥尤長布景小景愈工鮑洋洵之弟真魯衞也盧章京畿人乆在畫院多畫禁中物象如白杏花綠蕚梅白鸚鵡皆其本也李端京師人偏工棃花鳩子多作扇圖極形似亂離後卒於杭劉益京師人字益之以字行宣和間專與富燮供御畫其自得處多取内殿珍禽諦玩以為法不師古本故多酷似尤長小景作蓮塘背風荷葉百餘獨一紅蓮花半開其中創意可喜也富燮京師人宣和間與劉益同供御畫布景運思過於益夏奕不知何地人工翎毛雙流張庭堅家有野鴨鸂䳵兩軸極精詳鸂䳵作對而皆雄葢求脱俗也田逸民濟南人長於墨竹宣和畫院人其所作極美觀多作欹風冐雪帶雨含烟之状李誕河間人多畫叢竹筍籜鞭節色色畢具宣和體也畫繼卷六
