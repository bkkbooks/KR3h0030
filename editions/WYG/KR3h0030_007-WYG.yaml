body:
  text: 畫繼卷七宋鄧椿撰畜獸蟲魚李遵易侯宗古郗七郝章陳臯路臯龔吉吳九州周照老侯屋木舟車趙樓䑓郭待詔任安劉宗古蔬果藥草陶縝薛志小景雜畫馬賁周曽段吉先李達劉浩楊威畜獸蟲魚李遵易不知何郡人无咎有䟦畫魚圖甚詳侯宗古本畫院人宣和末罷諸藝局退居于洛畫西京大内大慶殿御屏面升龍傑作也郗七不知其名亦畫院人退居於洛畫西京大内大慶殿御屏皆拏雲吐霧龍比宗古有筆力郝章汾州人長於人馬河東稱三絶者謂路臯橐駞郝章人馬張逺山水也兵火後居閬州已八十每畫一人一騎則自云雖老矣他人亦做不到也陳臯漢州人長於畨馬頗盡其態張勘之甥也路臯并門人畫橐駞兼長鬼神每醉則畫駞不過數筆捽擉而成頗全生意龔吉不知何許人長於畫兎餘人所不及吳九州燕人善畫鹿窮盡畨鹿之態牛鹿馬鹿養茸退角老嫩之别無不曲盡其似周照畫院人專畫狗作竹石獃子殊有生意作大軸俗惡不入看老侯瀘州合江人善畫猿鹿馳名兩蜀兼長花果頗有生意屋木舟車趙樓䑓不得其名相州人賣畫中都屋宇深邃背隂向陽不失規矩繩墨也郭待詔趙州人每以界畫自矜云置方卓令衆工縱横畫之往往不知向背尺度真所謂良工心獨苦也不記名任安京師人入畫院工界畫每與山水賀真合手作圖軸一日安先作横披當中界樓閣分布亭榭滿中以困真真止作坡岸於下上則層巒疊嶂出於屋杪由是不能困劉宗古京師人宣和間以待詔官至成忠郎亂離後歸江左朝廷方尋訪車輅式而宗古進本稱㫖除提舉車輅院其畫人物長於成染不背粉水墨輕成但筆墨纖弱耳蔬果藥草陶縝不知何郡人荆公有題所畫果示徳逢詩所作花果精緻可玩薛志字子尚畫院出身長於水墨雜畫然翎毛不逮花果志不善設色嘗學於劉益益不肯盡授以非志所長也小景雜畫馬賁河中人長於小景作百雁百猿百馬百牛百羊百鹿圖雖極繁夥而位置不亂本佛像馬家後寫生馳名於元祐紹聖間周曾不知何地人與馬賁同時差髙於賁又長山水段吉先不知何地人无咎有題其小景三絶李逹京師人尤長位置好作沙汀逺岸含蓄不盡之意一時妙手也劉浩居華隂愛作雪驢水磨故事人物多布叙景致意象幽逺筆法輕清也楊威絳州人工畫村田樂每有販其畫者威必問所往若至都下則告之曰汝往畫院前易也如其言院中人爭出取之獲價必倍畫繼卷七
