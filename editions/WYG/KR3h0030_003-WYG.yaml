body:
  text: 畵繼卷三宋鄧椿撰軒冕才賢蘇軾李公麟米芾晁補之晁説之張舜民劉涇蘇過宋子房程堂范正夫顔博文任誼米友仁朱敦儒亷布李石巖穴上士林生李甲周純髙燾僧徳正江參軒冕才賢蘇軾字子瞻睂山人髙名大節照映今古據徳依仁之餘游心兹藝所作枯木枝榦虬屈無端倪石皴亦竒怪如其胸中蟠鬱也作墨竹從地一直起至頂或問何不逐節分曰竹生時何嘗逐節生耶雖文與可自謂吾墨竹一𣲖在徐州而先生亦自謂吾為墨竹盡得與可之法然先生運思清拔其英風勁氣来逼人使人應接不暇恐非與可所能拘制也又作寒林嘗以書告王定國曰予近畵得寒林已入神品雖然先生平日胸臆宏放如此而蘭陵胡世將家收所畵蟹瑣屑毛介曲隈芒縷無不備具是亦得從心不踰矩之道也米元章自湖南從事過黄州初見公酒酣貼觀音紙壁上起作兩行枯樹怪石各一以贈之山谷枮木道士賦云恢詭譎怪滑稽於秋毫之穎尤以酒為神故其觴次滴瀝醉餘嚬呻取諸造化之爐錘盡用文章之斧斤又題竹石詩云東坡老人翰林公醉時吐出胸中墨先生自題郭祥正壁亦云枯腸得酒牙角出肺肝槎芽生竹石森然欲作不可回寫向君家雪色壁則知先生平日非乘酣以發真興則不為也龍眠居士李公麟字伯時為舒城大族家世業儒父虛一嘗舉賢良方正科公麟熈寜三年登第以文學有名於時陸佃薦為中書門下省刪定官董敦逸辟檢法御史䑓官至朝奉郎元符三年病痺致仕終於崇寜五年學佛悟道深得㣲㫖立朝籍籍有聲史稱以畵見知於世非確論也平日博求鐘鼎古器圭璧寳玩森然滿家以其餘力留意畫筆心通意徹直造𤣥妙葢其大才逸羣舉皆過人也士夫以為鞍馬愈於韓幹佛像追吳道𤣥山水似李思訓人物似韓滉非過論也尤好畵馬飛龍状質噴玊圖形五花散身萬里汗血覺陳閎之非貴視韓幹以未竒故坡詩云龍眠胸中有千駟不惟畵肉兼畵骨山谷亦云伯時作馬如孫太古湖灘水石謂其筆力俊壯也以其耽禪多交衲子一日秀鐵面忽勸之曰不可畵馬他日恐墮其趣於是翻然以悟絶筆不為獨專意於諸佛矣其佛像每務出竒立異使世俗驚惑而不失其勝絶處嘗作長帶觀音其紳甚長過一身有半又為吕吉甫作石上卧觀音葢前此所未見者又畵自在觀音跏趺合爪而具自在之相曰世以破坐為自在自在在心不在相也乃知髙人達士縱施横設無施而不可者平生所畫不作對多以澄心堂紙為之不用縑素不施丹粉其所以超乎一世之上者此也郭若虛謂吳道子畫今古一人而已以予觀之伯時既出道子詎容獨步耶有孝經圖九歌圖歸去来圖陽闗圖琴鶴圖憩寂圖嚴子陵釣灘圖山荘圖卜居圖又有虎脊天馬天育驃騎好頭赤沐猴馬欲􅕁馬象龍馬及揩癢虎等圖一時名賢俱留紀詠也襄陽漫士米黻字元章嘗自述云黻即芾也即作芾世居太原後徙於吳宣仁聖烈皇后在藩其母出入邸中後以舊恩遂補校書郎自蔡河撥發為太常博士出知常州復入為書畵學博士賜對便殿擢禮部員外郎以言罷知淮陽軍芾人物蕭散被服效唐人所與逰皆一時名士嘗曰伯時病右手後余始作畵以李常師吳生終不能去其氣余乃取顧髙古不使一筆入吳生又李筆神采不髙余為睛目面文骨法自是天性非師而能惟作古忠賢像也又嘗與伯時論分布次第作子敬書練裙圖復作支許王謝於山水間縱步自挂齋室又以山水古今相師少有出塵格因信筆為之多以烟雲掩映樹木不取工細有求者只作横挂三尺惟寳晉齋中挂雙幅成對長不過三尺標出乃不為椅所蔽人行過肩汗不著更不作大圖無一筆闗仝李成俗氣然公字札流傳四方獨於丹青誠為罕見予止在利倅李驥元駿家見二畫其一紙上横松梢淡墨畫成針芒千萬攅錯如鐵今古畵松未見此製題其後云與大觀學士步月湖上各分韻賦詩芾獨賦無聲之詩葢與李大觀諸人夜游潁昌西湖之上也其一乃梅松蘭菊相因於一紙之上交柯互葉而不相亂以為繁則近簡以為簡則不疏太髙太竒實曠代之竒作也乃知好名之士其欲自立於世者如此大觀乃元駿之族父畫後歸元駿晁補之字无咎濟北人元祐中為吏部郎中紹聖中謫監信州稅流落乆之張天覺當國起知泗州不累月下世有自畫山水留春堂大屏上題云胸中正可吞雲夢琖底何妨對聖賢有意清秋入衡霍為君無盡寫江天又題自畫山水寄人云虎觀他年清汗手白頭田畆未能閒自嫌麥壠無佳思戯作南齋百里山陳無已獨愛重其蹟亦嘗詠其扇云前身阮始平今代王摩詰偃屈葢代氣萬里入咫尺无咎又嘗増添蓮社圖様自以意先為山石位置向背作粉夲以授畵史孟仲寕令傳模之菩薩倣侯昱雲氣倣吳道𤣥天王松石倣闗仝堂殿草樹倣周昉郭忠恕卧槎垂藤倣李成崖壁痩木倣許道寧湍流山嶺騎從鞬服倣魏賢馬以韓幹虎以包鼎􅆐猴鹿以易元吉鶴白鷴若鳥鼠以崔白集彼衆長共成勝事今人家往往摹臨其本傳於世者多矣晁説之字以道少慕司馬温公之為人自號景迂未三十東坡以著述科薦之靖康初自休致中召為著作郎後試中書舍人兼東宫詹事建炎初政以待制侍讀而終山谷嘗題其雪雁云飛雪灑蘆如銀箭前雁驚飛後回盼憑誰説與謝元暉休道澄江靜如練又无咎題四弟横軸畵云黄葉滿青山枯蒲淨寒水鳬雁下陂塍牛羊散墟里擔穫暮来歸兒迎婦窺籬虎頭無骨相田野有餘思張侍郎舜民字芸叟號浮休居士紹聖入黨籍貶均州紹興初追復直學士生平嗜畵題評精確雖南遷羇旅中每所經從必搜訪題識東南士大夫家所藏名品悉載録中亦能自作山水有自題扇詩云忽忽南遷不記年二妃祠外橘洲前眼昏筆戰誰能畵無奈霜紈似月圓又題鄧正字家劉明復秋景末句云我有故山常自冩免敎魂夢落天涯劉涇字巨濟簡州人熈寧六年進士中第王安石薦為經學所檢討厯太學博士因講詩為詩生所服後罷諸生乞留不報終職方郎中涇米元章之書畵友也善作林石槎竹筆墨狂逸體製㧞俗予家藏其幅紙所作竹葉㡬逼鍾郭今成都大智院法堂壁間有松竹窠植二惜其歳乆將磨滅也蘇過字叔黨坡公之季子也元祐中公知杭州叔黨年十九預計偕七年公為兵部尚書任承務郎後公謫英州貶儋州移亷永二州叔黨皆侍行叔父欒城公每稱其孝平生禁錮僅三十年晚除中山倅而卒善作怪石叢篠咄咄逼翁坡有觀過所作木石竹三絶以為老可能為竹寫真小坡解與竹傳神者是也晁以道誌其墓亦云書畵之勝亦克肖似其先人又時出新意作山水逺水多紋依巖多屋木皆人跡絶處竝以焦墨為之此出竒也宋子房字漢傑鄭州滎陽人少府監選之子復古之猶子也官至正郎坡公䟦其畵謂不古不今稍出新意若為之不已當作著色山也又云觀士人畵如閱天下馬取其意氣所到乃若畵工往往只取鞭䇿皮毛槽櫪芻秣無一㸃俊發看數尺許便倦漢傑真士人畫也又云假之數年當不減復古也初崇觀盛時大興畵學予大父中書公見其江臯秋色圖甚珍愛之首薦為博士然其人乃賢胄子不獨以畵取也所著畵法六論極其精到程堂字公明睂人舉進士為駕部郎中善畵墨竹宗𣲖湖州出湖州之門者獨公明入室也好畵鳳尾竹其梢極重作回旋之勢而枝葉不失向背又登峩睂山見菩薩竹有結花於節外之枝者茸宻如裘即寫其形於中峰乾明寺僧堂壁間儼如生也又象耳山有苦竹紫竹風竹雨竹好事者已刻之石成都笮橋觀音院亦有所畵竹且題絶句云無姓無名逼夜來院僧根問苦相猜攜燈笑指屏間竹記得當年手自栽又能作園蔬嘗見紫芥紫茄二軸奪真也范正夫字子立潁昌人文正公之諸孫徳孺之子也長於水墨雜畵標格髙秀予家與之同居潩水多藏其得意之作如訪戴圖脊令圖竹石圖寄興清逺真士人筆也惜乎以名家髙才而知鳯翔還鄉適遭兵變死之顔博文字持約徳州人政和八年嘉王榜登甲科長於水墨宇文季蒙龍圖家有横披十六羅漢其筆法位置如伯時但意韻差短耳陳去非次何文縝題所作墨梅三絶云窓前光景晩清新半幅溪藤萬里春從此不貪江路逺勝􅂸心力喚真真奪得斜枝不放歸倚窓乘月看熹㣲墨池雪嶺春俱好付與詩人説是非未央宫裏紅杏羯鼔三聲打開大庾嶺頭梅萼管城呼上屏来非此畵不稱此詩也初持約與王寀厚善寀敗持約方退朝聞之即馳馬還家閉闗拒人盡焚與寀平生往来牋記詩文之類於是獨免任誼字才仲宋復古之甥也嘗為協律郎後通判澧州適丁亂離鍾賊反叛為羣盗所殺平日凡所經厯江山佳處則䑛筆吮墨輒成圖軸髣髴籠罩清潤可喜邵澤民為春官才仲正在太常與之同部相好甚宻今其家富有才仲手跡有南北江山圖平蕪千里圖四更山吐月圖唐功臣圖斗山烟市圖松溪深日圖又取平生所見蘭花數十種隨其形状各命以名如杏梁歸燕丹山翔鳯之類皆小字𨽻書記其所見之處邵氏名曰香圃其𨽻古勁學中郎也米友仁元章之子也㓜年山谷贈詩曰我有元暉古印章印刓不忍與諸郎虎兒筆力能扛鼎敎字元暉繼阿章遂字元暉元章當置畵學之初召為博士便殿賜對因上友仁楚山清曉圖既退賜御書畵各二軸友仁宣和中為大名少尹天機超逸不事繩墨其所作山水㸃滴烟雲草草而成而不失天真其風氣肖乃翁也每自題其畵曰墨戱被遇光堯官至工部侍郎敷文閣直學士日奉清閒之燕方其未遇時士大夫往往可得其筆既貴甚自秘重雖親舊間亦無緣得之衆嘲曰解作無根樹能描濛鴻雲如今供御也不肯與閒人後享年八十神明如少壯時無疾而逝朱敦儒字希真少從陳東野學嘗賦古鏡云試將天下照萬象總分明東野竒之紹興間御史明橐宣諭廣東被㫖訪求遺逸是時希真放浪江湖間自江西避亂晉康橐遂以應詔命初品官召赴闕登對改官入館為郎出為浙東憲秦檜當國有携希真畵山水謁檜檜薦于上頗被眷遇與米元暉對御輒畵而希真恥以畵名輒退避不居也故常告親友曰吾非善畵者所畵多出錢端囘之手其實非也廉布字宣仲山陽人妙年登科官至武學博士以聨貴姻坐累遂廢終身後居紹興既絶仕宦之念專意繪事山水林石種種飄逸師東坡㡬於升堂也其子頗得家法今有圖軸傳於世李石字知㡬資州人少負才名既登第以趙逵荘叔左史之薦任太學博士直情徑行不附權貴遂不容於朝出主石室就學者其合如雲至閩越之士萬里而来刻石題諸生名㡬千人蜀學之盛古今鮮儷也今倅成都醉吟之餘時作小筆風調逺俗葢其人品既髙雖游戱間而心畫形矣巖穴上士杭士林生作江湖景蘆雁水禽氣格清絶米老謂唐無此畵可竝徐熈在艾宣張涇寳覺之右人罕得之李甲字景元自號華亭逸人作逸筆翎毛有意外趣但木柯未佳耳坡題其喜鵲圖云聞説神仙郭恕先醉中狂筆勢瀾翻百年牢落何人繼只有華亭李景元又晁无咎題周兼彦所収李甲畵三絶鵲云上林花妥逐鶯飛愁絶江南雪裏時嚄唶何須傍簷喜毰毸相對兩寒枝鴈云網羅無限稻􅆝肥憐爾冥冥亦庶㡬戯鴨眠鳬滿中沚衡陽無意更南飛鴨云急風吹雪滿汀洲近臘淮南憶倦游小鴨枯荷野艇冷去年今日凍髙郵周純字忘機成都華陽人後依解潛乆留荆楚故亦自稱楚人少為浮屠弱冠遊京師以詩畵為佛事都下翕然知名士大夫多與之遊而王寀輔道最與相親後坐累編管惠州不許生還適鄰郡建神霄宫本路憲舊知其人請朝廷赦能畵人周純来作繪事從之於是憑藉得以自如其山水師思訓衣冠師凱之佛像師伯時又能作花鳥松竹牛馬之屬變態多端一一清絶畵家於人物必九朽一罷謂先以土筆撲取形似數次修改故曰九朽繼以淡墨一描而成故曰一罷罷者畢事也獨忘機不假乎此落筆便成而氣韻生動每謂人曰書畵同一闗捩善書者又豈先朽而後書耶此葢卓識也初寀未敗㑹朝士大尹盛章在焉謂忘機曰子能為我作圖梅状遥知不是雪為有暗香来之意乎忘機曰此臨川詩須公自有此句我始為之盛恨甚未㡬寀敗而盛猶為京尹故忘機被禍獨酷髙燾字公廣沔州人自號三樂居士作小景自成一家清逺靜深一洗工氣眠鴨浮雁衰桞枯枿最為珍絶篆𨽻飛白一一造妙僧徳正信州人宣和郎官徐兢明叔之兄紹興侍從徐林穉山之弟登科為平江敎官棄而出家是日即勅住江州圜通寺開堂拈香為三世諸佛於是其徒不容棄去居廬山南疊石庵服習辟榖閩淮名山意往無礙凡登山臨水即横笛自娛後入蜀其兄隂遣人偽作其徒賸賫金帛牽挽而歸過叙州宣化縣乆留樊賔少卿家作峩睂圖山水人物種種清髙初登峩睂時煉指供佛兩手止餘四指麄可執筆而畵意自足其松石人物專學龍眠遇興伸紙揮毫頃刻而成貴勢或求之絶不與江參字貫道江南人長於山水形貎清癯嗜香茶以為生初以葉少藴左丞薦于宇文湖州季蒙今其家有泉石五幅圖一本筆墨學董源而豪放過之季蒙欲多取其畵而貫道尋被召去止得此圖居以為歉後劉季髙侍郎再寄江居圖一卷作無盡景始少慰意當貫道被召時尚書張如瑩知臨安貫道既到臨安即有㫖館於府治明當引見是夕殂信有命也畵繼卷三
