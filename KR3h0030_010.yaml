body:
  text: 畫繼卷十宋鄧椿撰雜說論近徽宗建龍德宫成命待詔圖畫宫中屏壁皆極一時之選上來幸一無所稱獨顧壺中殿前柱廊栱眼斜枝月季花問畫者為誰實少年新進上喜賜緋褒錫甚寵皆莫測其故近侍嘗請於上上曰月季鮮有能畫者蓋四時朝暮花蘂葉皆不同此作春時日中者無毫髮差故厚賞之宣和殿前植荔枝既結實喜動天顔偶孔雀在其下亟召畫院衆史令圖之各極其思華彩爛然但孔雀欲升藤墩先舉右腳上曰未也衆史愕然莫測後數日再呼問之不知所對則降㫖曰孔雀升髙必先舉左衆史駭服宣和殿御閣有展子䖍四載圖最為髙品上每愛玩或終日不捨但恨止有三圖其水行一圖特補遺耳一日中使至洛忽聞洛中故家有之亟告留守求觀既見則愕曰御閣中正缺此一圖登時進入所謂天生神聖物必有會合時也聞之薛志曰眀逹皇后閣初成左廊有劉益所畫百猿後志於右畫百鶴以對之舉動各無相犯頗稱上㫖賞賚十倍也政和間每御畫扇則六宫諸邸競皆臨倣一樣或至數百本其間貴近往往有求御寶者先大父在樞府日有㫖賜第於龍津橋側先君侍郎作提舉官仍遣中使監修比背畫壁皆院人所作翎毛花竹及家慶圖之類一日先君就視之見背工以舊絹山水揩拭几案取觀乃郭熙筆也問其所自則云不知又問中使乃云此出內藏庫退材所也昔神宗好熙筆一殿專背熙作上即位後易以古圖退入庫中者不止此耳先君云幸奏知若只得此退畫足矣明日有㫖盡賜且命輿至第中故第中屋壁無非郭畫誠千載之㑹也政和間有外宅宗室不記名多蓄珍圖往往王公貴人令其别識於是遂與常賣交通凡有竒蹟必用詭計勾致其家即時臨摹易其真者其主莫能别也復以真本厚價易之至有循環三四者故當時號曰便宜三勾處士不記其名在宣和間鑒賞第一眷寵甚厚凡四方所進必令定品欲命以官謝而不為止賜處士之號令待詔畫院畫院界作最工專以新意相尚嘗見一軸甚可愛玩畫一殿廊金碧熀耀朱門半開一宫女露半身於戶外以箕貯果皮作棄擲狀如鴨腳荔枝胡桃棐栗榛芡之屬一一可辨各不相因筆墨精微有如此者祖宗舊制凡待詔出身者止有六種如模勒書丹􅏻背界作種飛白筆描畫欄界是也徽宗雖好畫如此然不欲以好玩輒假名器故畫院得官者止依倣舊制以六種之名而命之足以見聖意之所在也本朝舊制凡以藝進者雖服緋紫不得佩魚政宣間獨許書畫院出職人佩魚此異數也又諸待詔每立班則畫院為首書院次之如琴院棋玉百工皆在下又畫院聽諸生習學凡係籍者每有過犯止許罰直其罪重者亦聽奏裁又他局工匠日支錢謂之食錢惟兩局則謂之俸直勘旁支給不以衆工待也睿思殿日命待詔一人能雜畫者宿直以備不測宣喚他局皆無之也圖畫院四方召試者源源而來多有不合而去者蓋一時所尚專以形似苟有自得不免放逸則謂不合法度或無師承故所作止衆工之事不能髙也凡取畫院人不專以筆法往往以人物為先蓋召對不時恐被顧問故劉益以病贅異常雖供御畫而未嘗得見終身為恨也髙麗松扇如節板狀其土人云非松也乃水桞木之皮故柔膩可愛其紋酷似松柏故謂之松扇東坡謂髙麗白松理直而疏析以為扇如蜀中織棕櫚心蓋水栁也又有用紙而以琴光竹為柄如市井中所製摺疊扇者但精緻非中國可及展之廣尺三四合之止兩指許所畫多作士女乘車跨馬踏青拾翠之狀又以金銀屑飾地面及作雲漢星月人物粗有形似以其來逺磨擦故也其所染青緑竒甚與中國不同專以空青海緑為之近年所作尤為精巧亦有以絹素為團扇特柄長數尺為異耳山谷題之云㑹稽內史三韓扇分送黃門畫省中海外人烟來眼界全勝博物注魚蟲蘋汀遊女能騎馬傳道蛾睂畫不如寶扇真成集陳隼史臣今得殺青書倭扇以松板兩指許砌疊亦如摺疊扇者其柄以銅黶錢環子黃絲絛甚精妙板上罨畫山川人物松竹花草亦可喜竹山尉王公軒惠恭后家嘗作明州舶官得兩柄西天中印度那蘭陀寺僧多畫佛及菩薩羅漢像以西天布為之其佛相好與中國人異眼目稍大口耳俱怪以帶挂右肩裸袒坐立而已先施五藏於畫背乃塗五彩於畫面以金或朱紅作地謂牛皮膠為觸故用桃膠合柳枝水甚堅漬中國不得其訣也邵太史知黎州嘗有僧自西天來就公廨令畫釋迦今茶馬司有十六羅漢畫繼卷十
