body:
  text: 畫繼卷八宋鄧椿撰銘心絶品玉牒趙中大保之士俾家韓幹馬圖李伯時竝馳小馬圖黃筌鶴圖艾宣荷鴨葦雁圖范寬山圖許道寧山水圖崔慤三雁圖玉牒趙伯兼節推家東丹王舞胡圖燕穆之山林倒影圖郭熙濺撲圖洛人王朝議國寶良器家李成窠石小軸范寬橫山小軸范寬秋山六幅圖伯時起本馬圖文元公孫賈通判公傑家黃筌鼯捕鼠圖崔白鵰狐圖徐崇嗣荷蓼鷺鷥圖易元吉猿鹿扇圖眉山寶學程純老唐家唐畫諸功臣像圖李營丘山水大軸二圖崔白翎毛雙幅八圖孫太古湖灘水石圖汝州令狐中奉之子陳古諷家徐熙梅花嘉雀圖鍾隱槎竹瑞雞圖江南道士劉貞白梅雀圖范將軍胡佛圖徐熙瓜圖黃筌偷倉雀圖孫太古焦夫子圖河南邵澤民侍郎溥家徽宗花鳥百扇圖董奴子叢花圖戴嵩牛圖徐熙荷花鵝圖李成偃松圖邵太史博公濟家徐熙牡丹戲魚圖閻立本鎖諫圖李後主蟹圖李伯時嫁小喬圖李後主曉竹圖孫位松竹壁孫太古維摩壁盧楞伽羅漢十六壁成都雙流張圭庭堅家曹道元摹曹弗興醉佛林圖徐熙牡丹獨幅圖郭恕先畫藁十圖崔白禽竹四圖河南王朝議樂道沂家李成寒林四幅圖郭熙山水雙幅圖崔慤蘆雁六幅圖中山劉寶賢瓌提刑家徐熙娑羅花圖黃筌花竹馴雉圖文正公孫李大觀家周昉虢國夫人圖范寬武關雪圖摩詰髙克明李成扇圖叔父符寶叔誼家徽宗皇帝御賜竹石扇圖黃筌海棠金雞圖營丘山水圖郭熙山水雙幅圖河陽李邦獻士舉敷文家徽宗皇帝御賜雜禽圖徐熙牡丹叢圖董源著色山水圖中原王冠朝元台制幹家徽宗皇帝鷗荷圖王摩詰橫披山水圖李成山水扇圖東丹王鞍馬圖遂寧王灼晦叔撫幹家童仁益波旬幸佛涅槃圖崔白禽竹雙幅圖范瓊佛壁張南本觀音壁黃筌鶴壁孫太古列星壁遂寧客鎮張衍知縣家吳道子三教圖厲歸真百牛圖孫太古十一曜圖阿陽陳古與權安撫家黃筌牡丹馴貍圖黃筌雪梅凍雀圖紀真山水圖馬賁百雁百猿圖徐髙盤魚圖綿州李亷夫德隅知郡家徽宗皇帝著色橫山圖郭熙橫山圖開封尹盛章季文家徽宗皇帝風竹鴝鵒喜鵲圖顧愷之三教圖戴嵩牛圖崔白雙幅禽竹圖范寬四時山水圖宣獻公孫宋艾去病家趙昌叢萱月季圖太常少卿何麒子應家吳道子白衣觀音圖韓滉白牛圖張南本勘書圖黃居寀雀竹圖唐希雅風竹驚禽圖巨然四時橫山圖徐熙梨桃折枝圖崔白鴛鴦蒲荷圖李成四幅林石圖張戡八幅蕃馬圖中原衛昻師房知縣家趙邈卓伏石眠虎圖徐熙梅菊萱荷雜禽圖包鼎雙虎圖成都王稑茂先大夫家黃筌秋山圖勾龍爽野老移居圖文湖州雜畫鳥獸草木橫披圖趙昌雞冠花圖廣都宇文時中季蒙龍圖家徽宗皇帝水墨花禽圖王維雪山圖杜措佛圖董奴子雞冠花圖李伯時髙僧圖又嘶𩥇二馬圖又明皇八馬圖又水晶宫明月館圖又退之見大顛圖江貫道飛泉怪石圖又江居圖成都郭勉中敦一承議家勾龍爽宋鈞去獸圖漢州何耕道夫類元家盧楞伽小本十六羅漢圖范榮公孫淑忠甫家黃筌竹雀圖趙昌折枝桃圖王維雪竹圖馬賁㕍圖雙流趙延修仲知縣家黃筌竹雀圖又蘆鴨圖孫太古列宿像圖雙流王焞子中縣尉家黃筌竹鶴壁雙流宇文子震子友主簿家黃筌花竹禽兔圖逹守時道宏廣叔家艾宣棘鶉圖徐髙魚圖王友折李草蟲圖成都吕給事陶元鈞家東坡竹石枯槎圖湖州六幅槎竹圖易元吉紙本猿獬圖燕穆之龍圖曾孫興祖知縣家龍圖公忍事敵災星圖又山水橫幅圖又寒林橫幅圖又鷺鷥圖又散馬橫披圖又墨竹圖蜀僧智永房吳道子慈氏菩薩圖范瓊正坐佛圖惠崇卧雪圖廣安黎希聲博士孫邦基家黃筌竹鶴竹雀圖范寬四時山水圖廣安姚賔觀國通判家許道寧四時山水圖范寬四時山水圖易元吉猴犬圖右前所載圖軸皆千之百百之十十之一中之所擇也若盡載平日所見必成兩牛腰矣然不載者皆米元章所謂慚惶殺人之物何足以銘諸心哉畫繼卷八
